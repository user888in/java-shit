name: aquatrack
description: A native hydration and routine tracking app with smart adaptive reminders
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Notifications
  flutter_local_notifications: ^16.3.0
  awesome_notifications: ^0.8.2
  
  # Charts & Visualization
  fl_chart: ^0.65.0
  percent_indicator: ^4.2.3
  
  # Utilities
  intl: ^0.18.1
  path_provider: ^2.1.1
  share_plus: ^7.2.1
  permission_handler: ^11.1.0
  uuid: ^4.2.2
  file_picker: ^6.1.1
  timezone: ^0.9.2
  
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  table_calendar: ^3.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/
    - assets/images/
